<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2Pixels - Login</title>
    <link rel="stylesheet" href="login.css">
    <link rel="icon" href="img/cs2icone.ico" type="image/x-icon">
</head>
<body>
    <main class="container-login">
        <section id="corpo-login">
                <h1>CS <span>Pixels</span></h1>
                <p>Comece já a melhorar seu nível</p>
            <form>
                <div id="usuario">
                    <img src="img/usuario-icone.png" alt="icone-usuario" width="20">
                    <input type="text" id="usuario" name="usuario" placeholder="Usuário" required>
                </div>

                <div id="senha">
                    <img src="img/cadeado-icone.png" alt="icone-senha" width="20">
                    <input type="password" id="senha" name="senha" placeholder="Senha" required>
                </div>

                <button type="submit" id="butao-entrar">Entrar</button>
            </form>

            <footer class="cadastro">
                <p>Não possui uma conta? <a href="cadastro.html">Cadastre-se</a></p>
            </footer>
        </section>
    </main>

</body>
</html>
